spring:
    application:
        name: config-server
    cloud:
        config:
            server:
                git: 
                    uri: https://github.com/NG720/Microservices-Spring-GYGY-5.0.git
                    default-label: main
                    search-paths: microservices/configs,microservices/configs/{application}
                    clone-on-start: true
                    force-pull: true
                native:
                    search-locations:
                        - file:../
                        - file:../{application}
                
server:
    port: 8888
